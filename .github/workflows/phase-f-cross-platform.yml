name: phase-f-cross-platform

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  RUN_ID: cross-platform-v1-${{ github.run_id }}

jobs:
  collect:
    name: collect-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Collect platform metrics
        run: >-
          cargo run --release --bin xtask -- cross-platform collect --run-id "${{ env.RUN_ID }}" --platform-label "${{ runner.os }}-${{ runner.arch }}" --binary "target/release/pngoptim${{ runner.os == 'Windows' && '.exe' || '' }}" --build

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase-f-platform-${{ runner.os }}-${{ runner.arch }}
          path: |
            reports/cross_platform/${{ env.RUN_ID }}/platform/*.json
          if-no-files-found: error

  aggregate:
    name: aggregate
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: phase-f-platform-*
          merge-multiple: true
          path: reports/cross_platform/${{ env.RUN_ID }}/platform

      - name: Aggregate cross-platform report
        run: >-
          cargo run --release --bin xtask -- cross-platform aggregate --run-id "${{ env.RUN_ID }}"

      - name: Upload aggregate report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: phase-f-cross-platform-summary
          path: |
            reports/cross_platform/${{ env.RUN_ID }}/summary.md
            reports/cross_platform/${{ env.RUN_ID }}/consistency.csv
            reports/cross_platform/${{ env.RUN_ID }}/inconsistent_samples.json
          if-no-files-found: warn
