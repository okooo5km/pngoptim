name: phase-f-cross-platform

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

env:
  RUN_ID: cross-platform-v1-${{ github.run_id }}

jobs:
  collect:
    name: collect-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow

      - name: Collect platform metrics
        run: |
          python scripts/cross_platform/run_phase_f_cross_platform.py \
            --mode collect \
            --run-id "${{ env.RUN_ID }}" \
            --platform-label "${{ runner.os }}-${{ runner.arch }}" \
            --build

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase-f-platform-${{ runner.os }}-${{ runner.arch }}
          path: |
            reports/cross_platform/${{ env.RUN_ID }}/platform/*.json
          if-no-files-found: error

  aggregate:
    name: aggregate
    needs: collect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: phase-f-platform-*
          merge-multiple: true
          path: reports/cross_platform/${{ env.RUN_ID }}/platform

      - name: Aggregate cross-platform report
        run: |
          python scripts/cross_platform/run_phase_f_cross_platform.py \
            --mode aggregate \
            --run-id "${{ env.RUN_ID }}"

      - name: Upload aggregate report
        uses: actions/upload-artifact@v4
        with:
          name: phase-f-cross-platform-summary
          path: |
            reports/cross_platform/${{ env.RUN_ID }}/summary.md
            reports/cross_platform/${{ env.RUN_ID }}/consistency.csv
            reports/cross_platform/${{ env.RUN_ID }}/inconsistent_samples.json
          if-no-files-found: error
