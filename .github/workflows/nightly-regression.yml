name: nightly-regression

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run nightly regression (Rust xtask)
        run: >-
          cargo run --release --bin xtask -- nightly-regression --run-id "${{ github.run_id }}" --binary target/release/pngoptim --build --quality 55-75 --speed 4 --iterations 2 --fuzz-cases 24

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-${{ github.run_id }}
          path: |
            reports/quality-size/nightly-quality-size-${{ github.run_id }}/**
            reports/perf/nightly-perf-${{ github.run_id }}/**
            reports/stability/nightly-stability-${{ github.run_id }}/**
          if-no-files-found: error
