name: nightly-regression

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow numpy

      - name: Build release binary
        run: cargo build --release

      - name: Run quality/size guard
        run: |
          python scripts/evaluation/run_phase_d_quality_size.py \
            --run-id "nightly-quality-size-${{ github.run_id }}" \
            --candidate target/release/pngoptim \
            --quality 55-75 \
            --speed 4

      - name: Run perf regression
        run: |
          python scripts/perf/run_phase_e_perf.py \
            --run-id "nightly-perf-${{ github.run_id }}" \
            --candidate target/release/pngoptim \
            --quality 55-75 \
            --speed 4 \
            --iterations 2

      - name: Run stability regression
        run: |
          python scripts/stability/run_phase_f_stability.py \
            --run-id "nightly-stability-${{ github.run_id }}" \
            --binary target/release/pngoptim \
            --fuzz-cases 24 \
            --timeout-sec 6

      - name: Upload nightly artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-${{ github.run_id }}
          path: |
            reports/quality-size/nightly-quality-size-${{ github.run_id }}/**
            reports/perf/nightly-perf-${{ github.run_id }}/**
            reports/stability/nightly-stability-${{ github.run_id }}/**
          if-no-files-found: error
