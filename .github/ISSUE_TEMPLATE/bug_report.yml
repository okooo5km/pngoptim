name: Bug Report
description: Report a bug with reproducible steps and evidence.
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
    validations:
      required: true

  - type: input
    id: phase
    attributes:
      label: Phase
      description: A/B/C/D/E/F/G
      placeholder: F
    validations:
      required: true

  - type: input
    id: dod
    attributes:
      label: Related DoD IDs
      description: Example: DOD-10, DOD-11
      placeholder: DOD-10

  - type: textarea
    id: reproduce
    attributes:
      label: Reproduce Steps
      description: Provide exact command(s) and input file(s).
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs Actual
      description: What did you expect, and what happened?
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence Paths
      description: reports/... or logs/...
      placeholder: |
        reports/stability/...
        reports/compat/...

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS/arch/rustc/python
      placeholder: macOS arm64 / rust 1.xx / python 3.11
